<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumia Côte d'Ivoire | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --jumia-orange: #f68b1e; }
        body { background-color: #f1f1f2; font-family: 'Roboto', sans-serif; }
        .bg-jumia { background-color: var(--jumia-orange); }
        .text-jumia { color: var(--jumia-orange); }
        .product-card { background: white; border-radius: 4px; position: relative; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .discount-badge { position: absolute; top: 8px; left: 8px; background: #feefdf; color: var(--jumia-orange); font-size: 10px; font-weight: 900; padding: 2px 5px; border-radius: 2px; z-index: 10; }
        #cart-panel { transition: transform 0.3s ease-in-out; }
        .flash-bar { height: 4px; background: #eee; border-radius: 2px; overflow: hidden; margin-top: 8px; }
        .flash-inner { height: 100%; background: var(--jumia-orange); width: 65%; }
    </style>
</head>
<body class="pb-20">

    <header class="bg-jumia sticky top-0 z-[100] shadow-md p-3">
        <div class="flex items-center justify-between text-white mb-3">
            <div class="flex items-center gap-4">
                <i class="fa-solid fa-bars text-xl"></i>
                <h1 class="text-2xl font-black italic">JUMIA <span class="not-italic text-[10px] font-light">CI</span></h1>
            </div>
            <div class="relative" onclick="openCart()">
                <i class="fa-solid fa-cart-shopping text-2xl"></i>
                <span id="badge" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full border border-white hidden">0</span>
            </div>
        </div>
        <div class="relative">
            <input type="text" placeholder="Chercher un produit, une marque..." class="w-full p-2.5 pl-10 rounded outline-none border-none text-sm">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
    </header>

    <div class="bg-red-600 p-3 flex justify-between items-center text-white">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-bolt-lightning text-yellow-400 animate-pulse"></i>
            <span class="text-xs font-black uppercase tracking-tighter">Ventes Flash</span>
        </div>
        <div class="flex items-center gap-2">
            <span class="text-[10px] font-bold opacity-80">FIN DANS :</span>
            <span id="timer" class="font-mono text-xs font-black bg-black/20 px-2 py-0.5 rounded">00:00:00</span>
        </div>
    </div>

    <main class="p-2 grid grid-cols-2 gap-2" id="grid">
        </main>

    <div id="cart-panel" class="fixed inset-0 bg-black/60 z-[200] hidden flex justify-end">
        <div class="bg-white w-full max-w-xs h-full flex flex-col p-5">
            <div class="flex justify-between items-center border-b pb-4 mb-4">
                <h2 class="font-black uppercase">Mon Panier</h2>
                <i class="fa-solid fa-xmark text-2xl" onclick="closeCart()"></i>
            </div>
            <div id="cart-items" class="flex-1 overflow-y-auto space-y-4"></div>
            <div class="pt-4 border-t">
                <div class="flex justify-between font-black text-xl mb-4">
                    <span>Total:</span>
                    <span id="total-price" class="text-jumia">0 F</span>
                </div>
                <button onclick="startCheckout()" class="w-full bg-jumia text-white py-4 rounded font-bold uppercase shadow-lg active:scale-95">Commander</button>
            </div>
        </div>
    </div>

    <div id="pay-screen" class="fixed inset-0 bg-white z-[300] translate-y-full flex flex-col transition-transform duration-500">
        <div class="p-4 border-b flex items-center gap-4">
            <i class="fa-solid fa-arrow-left text-xl text-gray-500" onclick="closePay()"></i>
            <h2 class="font-bold text-gray-700">PAIEMENT SÉCURISÉ</h2>
        </div>
        <div class="p-6 flex-1 max-w-md mx-auto w-full">
            <div class="bg-gray-100 p-8 rounded-3xl mb-8 text-center border-2 border-dashed border-gray-200">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Total à débiter</p>
                <div id="pay-amount" class="text-4xl font-black text-gray-900">0 FCFA</div>
            </div>
            <div class="space-y-6">
                <input type="number" id="tel" placeholder="N° Mobile Money (Wave/Orange)" class="w-full border-b-2 border-jumia py-3 text-xl font-black outline-none">
                <input type="password" placeholder="Code Secret" class="w-full border-b-2 border-gray-100 py-3 text-xl font-black outline-none focus:border-jumia">
                <button onclick="success()" class="w-full bg-black text-white py-5 rounded-2xl font-black text-lg mt-10 shadow-2xl">CONFIRMER LE PAIEMENT</button>
            </div>
            <p class="text-center text-[10px] text-gray-400 mt-10 font-bold uppercase tracking-widest">🔒 Certifié par Jumia Pay & Blakis</p>
        </div>
    </div>

    <script>
        // TA BASE DE DONNÉES (20 ARTICLES)
        const products = [
            {id:1, n:"iPhone 13 Pro Max Gold", p:450000, old:600000, img:"https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=300"},
            {id:2, n:"Ventilateur Binatone A16", p:18500, old:25000, img:"https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=300"},
            {id:3, n:"Chargeur Rapide 20W", p:7500, old:12000, img:"https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=300"},
            {id:4, n:"Airpods Pro Luxe", p:12000, old:20000, img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"},

            {id:6, n:"Nike Sneakers Pro", p:22000, old:35000, img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300"},
            {id:7, n:"Mixeur Moulinex 2L", p:25000, old:35000, img:"https://images.unsplash.com/photo-1570222020676-e03a117d7221?w=300"},
            {id:8, n:"Stabilisateur Digital", p:15000, old:22000, img:"https://images.unsplash.com/photo-1544006659-f0b21f04cb1d?w=300"},
            {id:9, n:"Powerbank 20.000mAh", p:14500, old:25000, img:"https://images.unsplash.com/photo-1609091839311-d536801527d5?w=300"},
            {id:10, n:"Rasoir Électrique Pro", p:8500, old:15000, img:"https://images.unsplash.com/photo-1503951914875-452162b0f3f1?w=300"},
            {id:11, n:"Rallonge 5M Luxe", p:4500, old:7000, img:"https://images.unsplash.com/photo-1558403194-611308249627?w=300"},
            {id:12, n:"T-shirt Coton Blakis", p:5000, old:8000, img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=300"},
            {id:13, n:"Montre Luxe Argent", p:25000, old:45000, img:"https://images.unsplash.com/photo-1524592094714-0f0654e20314?w=300"},
            {id:14, n:"Sac à dos PC 15'", p:12000, old:20000, img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=300"},
            {id:15, n:"Enceinte Bluetooth", p:35000, old:55000, img:"https://images.unsplash.com/photo-1608156639585-34051b36c4b2?w=300"},
            {id:16, n:"Fer à repasser Philips", p:12000, old:18000, img:"https://images.unsplash.com/photo-1517420812313-7949399ff2fc?w=300"},
            {id:17, n:"Ampoule LED Recharge", p:3500, old:6000, img:"https://images.unsplash.com/photo-1550985616-10810253b84d?w=300"},
            {id:18, n:"Écouteurs Filaire", p:2500, old:5000, img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"},
            {id:19, n:"Casque Audio Sony", p:45000, old:75000, img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=300"},
            {id:20, n:"Micro-onde LG 20L", p:65000, old:95000, img:"https://images.unsplash.com/photo-1574765345914-f483561a3375?w=300"}
        ];

        let cart = [];

        function render() {
            document.getElementById('grid').innerHTML = products.map(p => {
                const disc = Math.round((1 - p.p/p.old) * 100);
                return `
                <div class="product-card p-2 flex flex-col">
                    <div class="discount-badge">-${disc}%</div>
                    <img src="${p.img}" class="w-full h-32 object-cover bg-gray-50 rounded mb-2">
                    <h3 class="text-[10px] font-bold text-gray-700 h-8 line-clamp-2">${p.n}</h3>
                    <p class="text-sm font-black mt-1">${p.p.toLocaleString()} F</p>
                    <p class="text-[9px] text-gray-400 line-through">${p.old.toLocaleString()} F</p>
                    <div class="flash-bar"><div class="flash-inner" style="width: ${Math.random()*80 + 10}%"></div></div>
                    <button onclick="add(${p.id})" class="mt-3 w-full bg-jumia text-white py-2 rounded text-[10px] font-black uppercase shadow-sm active:opacity-75">Ajouter</button>
                </div>
            `}).join('');
        }

        function add(id) { cart.push(products.find(x => x.id === id)); update(); }
        
        function update() {
            const b = document.getElementById('badge');
            b.innerText = cart.length;
            b.classList.toggle('hidden', cart.length === 0);
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('total-price').innerText = total.toLocaleString() + " F";
            document.getElementById('pay-amount').innerText = total.toLocaleString() + " F";
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex gap-3 items-center border-b pb-3">
                    <img src="${i.img}" class="w-10 h-10 rounded object-cover">
                    <div class="flex-1 font-bold text-[10px]">${i.n}<br><span class="text-jumia">${i.p} F</span></div>
                    <i class="fa-solid fa-trash text-red-500 p-2" onclick="remove(${idx})"></i>
                </div>
            `).join('');
        }

        function remove(idx) { cart.splice(idx, 1); update(); }
        function openCart() { document.getElementById('cart-panel').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-panel').classList.add('hidden'); }
        function startCheckout() { if(cart.length > 0) document.getElementById('pay-screen').classList.remove('translate-y-full'); }
        function closePay() { document.getElementById('pay-screen').classList.add('translate-y-full'); }

        function success() {
            if(!document.getElementById('tel').value) return alert("Saisissez votre numéro !");
            alert("🔒 JUMIA CI PAY\n\nTraitement sécurisé en cours. Validez le retrait sur votre téléphone.");
            location.reload();
        }

        // LE CHRONOMÈTRE (COMPTE À REBOURS)
        function startTimer() {
            let h = 5, m = 54, s = 12;
            setInterval(() => {
                s--;
                if(s < 0) { s = 59; m--; }
                if(m < 0) { m = 59; h--; }
                document.getElementById('timer').innerText = 
                    `${h.toString().padStart(2,'0')}h : ${m.toString().padStart(2,'0')}m : ${s.toString().padStart(2,'0')}s`;
            }, 1000);
        }

        render();
        startTimer();
    </script>
</body>
