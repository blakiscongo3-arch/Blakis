<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blakis Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .product-card:active { transform: scale(0.98); }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <nav class="bg-black text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-widest">BLAKIS</h1>
            <div class="relative">
                <span class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z" />
                </svg>
            </div>
        </div>
    </nav>

    <div class="bg-gray-900 text-white py-10 px-6 text-center">
        <h2 class="text-3xl font-extrabold mb-2">MODE & ACCESSOIRES</h2>
        <p class="text-gray-400">Qualité et Style à portée de main.</p>
    </div>

    <div class="container mx-auto p-4 grid grid-cols-2 gap-4">
        
        <div class="product-card bg-white rounded-xl shadow-md overflow-hidden transition-all">
            <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=400" alt="T-shirt" class="w-full h-40 object-cover">
            <div class="p-3">
                <h3 class="font-bold text-gray-800">T-shirt Premium</h3>
                <p class="text-red-600 font-bold mt-1">10 000 FCFA</p>
                <button onclick="order('T-shirt Premium')" class="mt-3 w-full bg-black text-white py-2 rounded-lg text-sm font-semibold">Commander</button>
            </div>
        </div>

        <div class="product-card bg-white rounded-xl shadow-md overflow-hidden transition-all">
            <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400" alt="Chaussure" class="w-full h-40 object-cover">
            <div class="p-3">
                <h3 class="font-bold text-gray-800">Sneakers Style</h3>
                <p class="text-red-600 font-bold mt-1">25 000 FCFA</p>
                <button onclick="order('Sneakers Style')" class="mt-3 w-full bg-black text-white py-2 rounded-lg text-sm font-semibold">Commander</button>
            </div>
        </div>

    </div>

    <script>
        function order(product) {
            const phone = "225XXXXXXXX"; // Remplace par ton numéro ici
            const message = `Bonjour Blakis, je souhaite commander l'article : ${product}`;
            window.open(`https://wa.me/${phone}?text=${encodeURIComponent(message)}`, '_blank');
        }
    </script>

</body>
</html>
