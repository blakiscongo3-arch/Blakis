<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BLAKIS ÉLEC PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #FFD700; /* Couleur luxe */
            --deep-dark: #0A0A0A;    /* Fond haut de gamme */
            --card-bg: #1A1A1A;      /* Cartes produits */
            --text-main: #FFFFFF;
            --accent-red: #FF4D4D;   /* Pour les prix qui attirent l'oeil */
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--deep-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
        }

        /* En-tête minimalist style Tech-Chine */
        .app-bar {
            background: var(--deep-dark);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .app-bar h1 {
            font-size: 20px;
            margin: 0;
            letter-spacing: 2px;
            color: var(--primary-gold);
            text-transform: uppercase;
        }

        /* Grille Haute Performance (2 colonnes) */
        .product-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 15px;
        }

        .product-card {
            background: var(--card-bg);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #222;
            transition: transform 0.2s;
        }

        .product-image {
            width: 100%;
            height: 150px;
            background-color: #222;
            object-fit: cover;
        }

        .product-info {
            padding: 12px;
        }

        .product-title {
            font-size: 13px;
            font-weight: 400;
            margin: 0;
            height: 36px;
            overflow: hidden;
            color: #BBB;
        }

        .product-price {
            font-size: 18px;
            font-weight: 700;
            margin: 8px 0;
            color: var(--primary-gold);
        }

        /* Bouton Action Directe WhatsApp */
        .buy-button {
            display: block;
            background: var(--primary-gold);
            color: black;
            text-decoration: none;
            text-align: center;
            padding: 12px;
            font-weight: 700;
            font-size: 14px;
            border-radius: 8px;
            margin-top: 10px;
        }

        /* Style des boutons quand on touche sur mobile */
        .buy-button:active {
            opacity: 0.8;
            transform: scale(0.98);
        }
    </style>
</head>
<body>

<div class="app-bar">
    <h1>BLAKIS ÉLEC PRO</h1>
</div>

<div class="product-grid">
    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1509391366360-fe5bb58583bb" class="product-image">
        <div class="product-info">
            <h3 class="product-title">PANNEAU SOLAIRE 200W MONO</h3>
            <p class="product-price">45.000 F</p>
            <a href="https://wa.me/225XXXXXXXX?text=Commande%20Panneau%20Solaire%20200W" class="buy-button">ACHETER</a>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1617788131775-ceb2027fd12c" class="product-image">
        <div class="product-info">
            <h3 class="product-title">BATTERIE GEL 100Ah 12V</h3>
            <p class="product-price">85.000 F</p>
            <a href="https://wa.me/225XXXXXXXX?text=Commande%20Batterie%20100Ah" class="buy-button">ACHETER</a>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1558494949-ef010cbdcc4b" class="product-image">
        <div class="product-info">
            <h3 class="product-title">CÂBLE 2.5mm ROUGE (100m)</h3>
            <p class="product-price">24.000 F</p>
            <a href="https://wa.me/225XXXXXXXX?text=Commande%20Cable%202.5mm" class="buy-button">ACHETER</a>
        </div>
    </div>

    <div class="product-card">
        <img src="https://images.unsplash.com/photo-1558002038-1055907df827" class="product-image">
        <div class="product-info">
            <h3 class="product-title">DISJONCTEUR 16A SCHNEIDER</h3>
            <p class="product-price">2.500 F</p>
            <a href="https://wa.me/225XXXXXXXX?text=Commande%20Disjoncteur%2016A" class="buy-button">ACHETER</a>
        </div>
    </div>
</div>

</body>
</html>
