<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumia CI | Blakis Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --jumia-orange: #f68b1e; }
        .bg-jumia { background-color: var(--jumia-orange); }
        .text-jumia { color: var(--jumia-orange); }
        body { background-color: #f1f1f2; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .product-card { background: white; border-radius: 4px; transition: transform 0.2s; }
        .product-card:active { transform: scale(0.98); }
        #cart-sidebar { transition: transform 0.3s ease-in-out; }
        .loader-dots div { animation: blink 1.4s infinite both; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="pb-16">

    <nav class="bg-jumia p-3 sticky top-0 z-[100] shadow-md">
        <div class="max-w-md mx-auto flex flex-col gap-2">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-4 text-white">
                    <i class="fa-solid fa-bars text-xl" onclick="toggleSidebar()"></i>
                    <h1 class="text-xl font-black italic tracking-tighter">JUMIA <span class="font-light not-italic text-sm">| Blakis</span></h1>
                </div>
                <div class="flex items-center gap-4 text-white">
                    <i class="fa-solid fa-user text-xl"></i>
                    <div class="relative" onclick="openCart()">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="badge" class="absolute -top-2 -right-2 bg-red-600 text-[10px] font-bold px-1.5 py-0.5 rounded-full border border-white hidden">0</span>
                    </div>
                </div>
            </div>
            <div class="relative w-full">
                <input type="text" placeholder="Chercher un produit, une marque..." class="w-full p-2.5 pl-10 rounded shadow-inner outline-none text-sm border-none">
                <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
            </div>
        </div>
    </nav>

    <div class="bg-blue-600 text-white text-[11px] p-2 text-center font-bold uppercase tracking-widest">
        Ventes Flash : Jusqu'à -50% à Bondoukou
    </div>

    <main class="max-w-md mx-auto p-2 grid grid-cols-2 gap-2" id="shelf">
        </main>

    <div class="fixed bottom-0 inset-x-0 bg-white border-t flex justify-around p-3 z-50 shadow-2xl">
        <div class="flex flex-col items-center text-jumia"><i class="fa-solid fa-house text-lg"></i><span class="text-[9px] font-bold">Accueil</span></div>
        <div class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-list text-lg"></i><span class="text-[9px]">Catégories</span></div>
        <div class="flex flex-col items-center text-gray-400"><i class="fa-solid fa-bolt text-lg"></i><span class="text-[9px]">Flash</span></div>
        <div class="flex flex-col items-center text-gray-400" onclick="openCart()"><i class="fa-solid fa-cart-shopping text-lg"></i><span class="text-[9px]">Panier</span></div>
    </div>

    <div id="cart-sidebar" class="fixed inset-0 bg-black/60 z-[200] hidden flex justify-end">
        <div class="bg-white w-full max-w-sm flex flex-col animate-slide-left">
            <div class="p-4 border-b flex items-center justify-between">
                <h2 class="font-bold">PANIER (<span id="cart-qty">0</span>)</h2>
                <i class="fa-solid fa-xmark text-2xl" onclick="closeCart()"></i>
            </div>
            <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
            <div class="p-4 border-t bg-gray-50">
                <div class="flex justify-between font-black text-lg mb-4 uppercase">
                    <span>Total</span>
                    <span id="total-price" class="text-jumia">0 FCFA</span>
                </div>
                <button onclick="checkoutProcess()" class="w-full bg-jumia text-white py-4 rounded font-bold shadow-xl">COMMANDER</button>
            </div>
        </div>
    </div>

    <div id="checkout-screen" class="fixed inset-0 bg-white z-[300] hidden flex flex-col p-6">
        <div class="mb-6 flex items-center gap-4">
            <i class="fa-solid fa-arrow-left text-xl" onclick="closeCheckout()"></i>
            <h2 class="text-xl font-bold">Paiement Sécurisé</h2>
        </div>
        <div class="bg-gray-100 p-4 rounded-lg mb-6">
            <p class="text-xs text-gray-500">Montant à payer</p>
            <p id="final-sum" class="text-3xl font-black text-gray-800">0 FCFA</p>
        </div>
        <div class="space-y-4">
            <div class="border-2 border-orange-500 p-4 rounded flex items-center justify-between">
                <span>Payer par <b>WAVE</b></span>
                <span class="text-blue-500 text-xl">🌊</span>
            </div>
            <input type="number" placeholder="Votre numéro (Ex: 0171404345)" class="w-full border-b-2 border-gray-200 py-4 text-xl outline-none focus:border-orange-500">
            <button onclick="simPay()" class="w-full bg-black text-white py-4 rounded-xl font-black mt-10">CONFIRMER LE RETRAIT</button>
        </div>
    </div>

    <script>
        const db = [
            { id: 1, n: "Ventilateur Binatone A16", p: 18500, img: "https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=400" },
            { id: 2, n: "Chargeur iPhone 20W Original", p: 7500, img: "https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400" },
            { id: 3, n: "Airpods Pro avec Boitier", p: 12000, img: "https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400" },
            { id: 4, n: "Stabilisateur de tension Digital", p: 22000, img: "https://images.unsplash.com/photo-1544006659-f0b21f04cb1d?w=400" },
            { id: 5, n: "Smartwatch Ultra Série 9", p: 15000, img: "https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400" },
            { id: 6, n: "iPhone 13 Pro Max 256GB", p: 480000, img: "https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=400" }
        ];

        let cart = [];

        function init() {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = db.map(item => `
                <div class="product-card flex flex-col p-2 shadow-sm border border-gray-100">
                    <img src="${item.img}" class="w-full h-32 object-contain bg-gray-50 rounded">
                    <h3 class="text-[11px] mt-2 h-8 overflow-hidden leading-tight">${item.n}</h3>
                    <p class="font-bold text-sm mt-1">${item.p.toLocaleString()} F</p>
                    <button onclick="add(${item.id})" class="mt-2 w-full bg-jumia text-white py-1.5 rounded text-[10px] font-bold uppercase shadow-md active:bg-orange-700">Ajouter</button>
                </div>
            `).join('');
        }

        function add(id) {
            const item = db.find(x => x.id === id);
            cart.push(item);
            updateCart();
            // Effet Jumia : faire vibrer le panier
            document.getElementById('badge').classList.remove('hidden');
        }

        function updateCart() {
            document.getElementById('badge').innerText = cart.length;
            document.getElementById('cart-qty').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('total-price').innerText = total.toLocaleString() + " FCFA";
            document.getElementById('final-sum').innerText = total.toLocaleString() + " FCFA";

            document.getElementById('cart-list').innerHTML = cart.map((i, idx) => `
                <div class="flex gap-4 items-center bg-gray-50 p-2 rounded">
                    <img src="${i.img}" class="w-12 h-12 object-cover rounded">
                    <div class="flex-1"><p class="text-[10px] font-bold">${i.n}</p><p class="text-jumia font-black">${i.p} F</p></div>
                    <i class="fa-solid fa-trash-can text-red-400" onclick="remove(${idx})"></i>
                </div>
            `).join('');
        }

        function remove(idx) { cart.splice(idx, 1); updateCart(); }
        function openCart() { document.getElementById('cart-sidebar').classList.remove('hidden'); }
        function closeCart() { document.getElementById('cart-sidebar').classList.add('hidden'); }
        function checkoutProcess() { 
            if(cart.length === 0) return;
            document.getElementById('checkout-screen').classList.remove('hidden'); 
        }
        function closeCheckout() { document.getElementById('checkout-screen').classList.add('hidden'); }

        function simPay() {
            alert("🔒 Initialisation du paiement Wave...\nUne demande de confirmation a été envoyée au numéro configuré.");
            location.reload();
        }

        init();
    </script>
</body>
</html>
