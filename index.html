<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Exemple Produit Style Jumia</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f5f5f5; display: flex; justify-content: center; padding: 20px; }
        
        /* Conteneur du produit */
        .card { background: white; width: 300px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); overflow: hidden; transition: 0.3s; }
        .card:hover { transform: scale(1.02); }

        /* Image */
        .image-box { width: 100%; height: 250px; background-color: #eee; display: flex; align-items: center; justify-content: center; color: #888; }

        /* Détails */
        .info { padding: 15px; }
        .brand { color: #757575; font-size: 12px; text-transform: uppercase; }
        .title { font-size: 16px; margin: 5px 0; color: #313133; }
        .price { font-size: 20px; font-weight: bold; color: #f68b1e; } /* Couleur Orange Jumia */
        
        /* Bouton */
        .btn-add { width: 100%; background-color: #f68b1e; color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .btn-add:hover { background-color: #e07b16; }
    </style>
</head>
<body>

    <div class="card">
        <div class="image-box">PHOTO PRODUIT</div>
        <div class="info">
            <p class="brand">Samsung</p>
            <h3 class="title">Galaxy A54 - 128Go - Noir</h3>
            <p class="price">215.000 FCFA</p>
            <button class="btn-add">AJOUTER AU PANIER</button>
        </div>
    </div>

</body>
</html>
