<div id="gate" style="position:fixed; inset:0; background:#000; z-index:10000; display:flex; align-items:center; justify-content:center; padding:20px;">
    <div id="step1" style="background:#111; padding:30px; border-radius:20px; border:1px solid #333; width:100%; max-width:350px; text-align:center;">
        <h1 style="color:#FF6A00;">BLAKIS GLOBAL</h1>
        <p style="color:#888;">Inscription sécurisée</p>
        <input type="text" id="reg-name" placeholder="Nom complet" style="width:100%; padding:15px; margin:10px 0; background:#000; color:white; border:1px solid #444; border-radius:10px;">
        <input type="tel" id="reg-phone" placeholder="Numéro WhatsApp" style="width:100%; padding:15px; margin:10px 0; background:#000; color:white; border:1px solid #444; border-radius:10px;">
        <button onclick="envoyerCode()" style="width:100%; padding:18px; background:#FF6A00; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">RECEVOIR MON CODE D'ACCÈS</button>
    </div>

    <div id="step2" style="display:none; background:#111; padding:30px; border-radius:20px; border:1px solid #333; width:100%; max-width:350px; text-align:center;">
        <h2 style="color:#FF6A00;">Vérification</h2>
        <p style="color:#888;">Entrez le code reçu sur WhatsApp</p>
        <input type="number" id="input-code" placeholder="Code à 4 chiffres" style="width:100%; padding:15px; margin:10px 0; background:#000; color:white; border:1px solid #444; border-radius:10px; text-align:center; font-size:24px; letter-spacing:10px;">
        <button onclick="verifierCode()" style="width:100%; padding:18px; background:#25D366; border:none; border-radius:10px; font-weight:bold; cursor:pointer;">VALIDER ET ENTRER</button>
    </div>
</div>
