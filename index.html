<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAKIS STORE | Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .jumia-orange { background-color: #f68b1e; }
        #pay-screen { transition: transform 0.4s ease-in-out; }
        .hidden-scroll::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-[#f1f1f2] font-sans pb-20">

    <header class="jumia-orange p-3 sticky top-0 z-50 shadow-md">
        <div class="flex items-center justify-between text-white mb-2">
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-bars text-xl"></i>
                <h1 class="text-xl font-black italic underline decoration-white">BLAKIS</h1>
            </div>
            <div class="relative" onclick="showCart()">
                <i class="fa-solid fa-cart-shopping text-xl"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
            </div>
        </div>
        <div class="bg-white rounded flex items-center p-2 shadow-inner">
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2 text-sm"></i>
            <input type="text" placeholder="Chercher sur Blakis Store..." class="w-full text-sm outline-none">
        </div>
    </header>

    <div class="p-2">
        <h2 class="text-sm font-bold text-gray-600 mb-2 uppercase tracking-widest">Articles Recommandés</h2>
        <div class="grid grid-cols-2 gap-2" id="productGrid"></div>
    </div>

    <div id="cart-modal" class="fixed inset-0 bg-black/60 z-[100] hidden flex flex-col justify-end">
        <div class="bg-white rounded-t-3xl p-5 max-h-[80vh] overflow-y-auto shadow-2xl">
            <div class="flex justify-between items-center mb-5 border-b pb-2">
                <h2 class="font-black text-lg">PANIER</h2>
                <button onclick="hideCart()" class="text-3xl text-gray-400">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div class="mt-6 border-t pt-4">
                <div class="flex justify-between items-center mb-4 font-black text-xl">
                    <span>TOTAL :</span>
                    <span id="cart-total" class="text-[#f68b1e]">0 F</span>
                </div>
                <button onclick="goToPayment()" class="w-full bg-[#f68b1e] text-white py-4 rounded-xl font-bold uppercase shadow-lg">Finaliser la commande</button>
            </div>
        </div>
    </div>

    <div id="pay-screen" class="fixed inset-0 bg-white z-[200] translate-y-full flex flex-col">
        <div class="p-4 border-b flex items-center space-x-4">
            <button onclick="closePayment()"><i class="fa-solid fa-arrow-left text-xl text-[#f68b1e]"></i></button>
            <h2 class="font-black text-lg">PAIEMENT SÉCURISÉ</h2>
        </div>
        
        <div class="p-6 flex-1">
            <div class="mb-8">
                <p class="text-gray-400 text-xs font-bold uppercase mb-4">Montant à débiter</p>
                <div id="final-amount" class="text-4xl font-black text-gray-800">0 FCFA</div>
            </div>

            <div class="space-y-4">
                <label class="text-xs font-bold text-gray-500 uppercase">Choisir le réseau</label>
                <div class="grid grid-cols-2 gap-4">
                    <div onclick="selectMethod('Wave')" id="m-Wave" class="border-2 p-4 rounded-2xl flex flex-col items-center border-orange-500 bg-orange-50">
                        <span class="text-2xl mb-1 text-blue-500">🌊</span>
                        <b class="text-xs">Wave</b>
                    </div>
                    <div onclick="selectMethod('Orange')" id="m-Orange" class="border-2 p-4 rounded-2xl flex flex-col items-center border-gray-100">
                        <span class="text-2xl mb-1 text-orange-500">🍊</span>
                        <b class="text-xs">Orange</b>
                    </div>
                </div>

                <div class="mt-6">
                    <label class="text-xs font-bold text-gray-500 uppercase">Numéro de téléphone</label>
                    <input type="number" id="phone-pay" placeholder="Ex: 01 71 40 43 45" class="w-full border-b-2 border-orange-500 py-3 text-xl font-bold outline-none">
                </div>

                <div class="mt-6">
                    <label class="text-xs font-bold text-gray-500 uppercase">Code Secret</label>
                    <input type="password" placeholder="****" class="w-full border-b-2 border-gray-200 py-3 text-xl font-bold outline-none">
                </div>
            </div>
        </div>

        <div class="p-4">
            <button onclick="confirmPayment()" class="w-full bg-green-600 text-white py-4 rounded-2xl font-black text-lg shadow-xl uppercase">Confirmer le paiement</button>
        </div>
    </div>

    <div id="success-screen" class="fixed inset-0 bg-white z-[300] hidden flex flex-col items-center justify-center text-center p-10">
        <i class="fa-solid fa-circle-check text-green-500 text-8xl mb-4"></i>
        <h2 class="text-2xl font-black mb-2">PAIEMENT RÉUSSI !</h2>
        <p class="text-gray-500 mb-6">Votre commande a été validée. Blakis Store prépare votre colis pour Bondoukou.</p>
        <button onclick="location.reload()" class="bg-black text-white px-10 py-3 rounded-full font-bold">Retour au magasin</button>
    </div>

    <script>
        const products = [
            {id:1, n: 'Ventilateur Binatone', p: 18500, img: 'https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=400'},
            {id:2, n: 'Chargeur iPhone 20W', p: 7500, img: 'https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400'},
            {id:3, n: 'Airpods Pro Luxe', p: 12000, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'},
            {id:4, n: 'Rallonge 5m', p: 4500, img: 'https://images.unsplash.com/photo-1558403194-611308249627?w=400'},
            {id:5, n: 'Stabilisateur TV', p: 15000, img: 'https://images.unsplash.com/photo-1544006659-f0b21f04cb1d?w=400'},
            {id:6, n: 'iPhone 13 Pro', p: 380000, img: 'https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=400'},
            {id:7, n: 'Fer à Repasser', p: 8500, img: 'https://images.unsplash.com/photo-1517420812313-7949399ff2fc?w=400'},
            {id:8, n: 'Smartwatch S8', p: 18000, img: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'},
            {id:9, n: 'Micro Cravate Sans Fil', p: 9000, img: 'https://images.unsplash.com/photo-1590602847861-f357a9332bbc?w=400'},
            {id:10, n: 'Lampe Solaire LED', p: 5500, img: 'https://images.unsplash.com/photo-1550985616-10810253b84d?w=400'}
        ];

        let cart = [];

        function render() {
            document.getElementById('productGrid').innerHTML = products.map(p => `
                <div class="bg-white rounded shadow-sm flex flex-col p-2">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded mb-2">
                    <h3 class="text-[11px] font-medium h-8 overflow-hidden">${p.n}</h3>
                    <p class="font-black text-[#f68b1e] my-1">${p.p.toLocaleString()} F</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-black text-white py-2 rounded text-[10px] font-bold uppercase">Ajouter</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            update();
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + " F";
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex items-center space-x-3 border-b pb-3">
                    <img src="${i.img}" class="w-12 h-12 rounded object-cover">
                    <div class="flex-1 font-bold text-xs">${i.n}</div>
                    <div class="font-black text-sm">${i.p} F</div>
                </div>
            `).join('');
        }

        function goToPayment() {
            if(cart.length === 0) return;
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('final-amount').innerText = total.toLocaleString() + " FCFA";
            document.getElementById('pay-screen').style.transform = "translateY(0%)";
        }

        function confirmPayment() {
            const phone = document.getElementById('phone-pay').value;
            if(!phone) return alert("Veuillez entrer votre numéro !");
            
            document.getElementById('pay-screen').style.transform = "translateY(100%)";
            document.getElementById('success-screen').classList.remove('hidden');
        }

        function closePayment() { document.getElementById('pay-screen').style.transform = "translateY(100%)"; }
        function showCart() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function hideCart() { document.getElementById('cart-modal').classList.add('hidden'); }
        function selectMethod(m) {
            document.getElementById('m-Wave').classList.remove('border-orange-500', 'bg-orange-50');
            document.getElementById('m-Orange').classList.remove('border-orange-500', 'bg-orange-50');
            document.getElementById('m-'+m).classList.add('border-orange-500', 'bg-orange-50');
        }

        render();
    </script>
</body>
</html>
