<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAKIS | Boutique Officielle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        #side-menu { transition: transform 0.3s ease-in-out; }
    </style>
</head>
<body class="bg-[#f1f1f2] font-sans pb-16">

    <div id="side-menu" class="fixed inset-y-0 left-0 w-64 bg-white z-[100] shadow-2xl transform -translate-x-full">
        <div class="bg-[#f68b1e] p-5 text-white">
            <div class="flex justify-between items-center">
                <h2 class="font-bold">Menu Blakis</h2>
                <button onclick="toggleMenu()"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <p class="text-xs mt-2 italic">Bondoukou, Côte d'Ivoire</p>
        </div>
        <div class="p-4 space-y-4 text-gray-700">
            <div class="flex items-center space-x-3"><i class="fa-solid fa-house w-6"></i> <span>Accueil</span></div>
            <div class="flex items-center space-x-3"><i class="fa-solid fa-bolt w-6"></i> <span>Ventes Flash</span></div>
            <div class="flex items-center space-x-3"><i class="fa-solid fa-list w-6"></i> <span>Catégories</span></div>
            <hr>
            <div class="flex items-center space-x-3"><i class="fa-solid fa-phone w-6"></i> <span>Nous contacter</span></div>
            <div class="flex items-center space-x-3 text-green-600"><i class="fa-brands fa-whatsapp w-6"></i> <span>Aide WhatsApp</span></div>
        </div>
    </div>

    <header class="bg-[#f68b1e] p-3 sticky top-0 z-50 shadow-md">
        <div class="flex items-center space-x-4 mb-2 text-white">
            <button onclick="toggleMenu()"><i class="fa-solid fa-bars text-xl"></i></button>
            <h1 class="text-xl font-black italic tracking-taper flex-1">BLAKIS</h1>
            <i class="fa-solid fa-cart-shopping text-xl"></i>
        </div>
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="searchProduct()" placeholder="Chercher sur Blakis..." class="w-full p-2.5 rounded shadow-inner outline-none text-sm pl-10">
            <i class="fa-solid fa-magnifying-glass absolute left-3 top-3 text-gray-400"></i>
        </div>
    </header>

    <div class="bg-blue-600 text-white p-4 text-center font-bold text-sm mb-2">
        🚚 LIVRAISON GRATUITE SUR BONDOUKOU !
    </div>

    <div class="flex overflow-x-auto p-2 space-x-3 bg-white scrollbar-hide border-b">
        <button onclick="filterCat('all')" class="whitespace-nowrap bg-orange-100 text-[#f68b1e] px-4 py-1.5 rounded-full font-bold text-[11px]">Tous</button>
        <button onclick="filterCat('elec')" class="whitespace-nowrap bg-gray-100 px-4 py-1.5 rounded-full text-[11px]">Électricité</button>
        <button onclick="filterCat('tel')" class="whitespace-nowrap bg-gray-100 px-4 py-1.5 rounded-full text-[11px]">Téléphones</button>
        <button onclick="filterCat('maison')" class="whitespace-nowrap bg-gray-100 px-4 py-1.5 rounded-full text-[11px]">Maison</button>
    </div>

    <div class="p-2 grid grid-cols-2 gap-2" id="productGrid"></div>

    <div class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 flex justify-around p-2 z-50 shadow-lg">
        <div class="flex flex-col items-center text-[#f68b1e]">
            <i class="fa-solid fa-house"></i>
            <span class="text-[10px]">Accueil</span>
        </div>
        <div class="flex flex-col items-center text-gray-500" onclick="filterCat('tel')">
            <i class="fa-solid fa-list"></i>
            <span class="text-[10px]">Catégories</span>
        </div>
        <div class="flex flex-col items-center text-gray-500" onclick="window.open('https://wa.me/2250173865409')">
            <i class="fa-solid fa-circle-question"></i>
            <span class="text-[10px]">Aide</span>
        </div>
    </div>

    <script>
        const products = [
            {id:1, cat:'elec', n: 'Ventilateur Binatone', p: '18000', img: 'https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=400'},
            {id:2, cat:'elec', n: 'Rallonge 5m', p: '3500', img: 'https://images.unsplash.com/photo-1558403194-611308249627?w=400'},
            {id:3, cat:'tel', n: 'Chargeur iPhone 20W', p: '5000', img: 'https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400'},
            {id:4, cat:'tel', n: 'Airpods Pro Luxe', p: '10000', img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'},
            {id:5, cat:'maison', n: 'Lit 2 Places', p: '150000', img: 'https://images.unsplash.com/photo-1505693419173-42b9258a6270?w=400'},
            {id:6, cat:'maison', n: 'Matelas Ortho', p: '85000', img: 'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=400'}
        ];

        function toggleMenu() {
            const menu = document.getElementById('side-menu');
            if (menu.style.transform === 'translateX(0%)') {
                menu.style.transform = 'translateX(-100%)';
            } else {
                menu.style.transform = 'translateX(0%)';
            }
        }

        function displayProducts(items) {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = items.map(art => `
                <div class="bg-white rounded shadow-sm overflow-hidden flex flex-col">
                    <img src="${art.img}" class="w-full h-32 object-cover">
                    <div class="p-2 flex-1 flex flex-col justify-between">
                        <h3 class="text-[11px] text-gray-800 leading-tight h-8 overflow-hidden">${art.n}</h3>
                        <p class="text-black font-bold text-sm my-1">${art.p} FCFA</p>
                        <button onclick="order('${art.n}', '${art.p}')" class="w-full bg-[#f68b1e] text-white py-2 rounded text-[10px] font-bold">COMMANDER</button>
                    </div>
                </div>
            `).join('');
        }

        function searchProduct() {
            const text = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.n.toLowerCase().includes(text));
            displayProducts(filtered);
        }

        function filterCat(c) {
            if(c === 'all') displayProducts(products);
            else displayProducts(products.filter(p => p.cat === c));
        }

        function order(n, p) {
            window.open(`https://wa.me/2250173865409?text=Je suis intéressé par : ${n} (${p} FCFA)`);
        }

        displayProducts(products);
    </script>
</body>
</html>
