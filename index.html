<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Molo Molo Style - Blakis Pay</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .page { display: none; transition: all 0.3s ease; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .molo-gradient { background: linear-gradient(135deg, #0052FF 0%, #0035A5 100%); }
        .molo-card { border-radius: 24px; }
    </style>
</head>
<body class="bg-[#F8FAFF]">

    <div id="auth" class="page active h-screen bg-white p-8 flex flex-col justify-between">
        <div class="mt-12">
            <div class="w-16 h-16 molo-gradient rounded-2xl flex items-center justify-center shadow-lg mb-6">
                <i class="fa-solid fa-wallet text-white text-3xl"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-900 leading-tight">Payez tout<br><span class="text-blue-600">Molo Molo.</span></h1>
            <p class="text-slate-500 mt-4">La nouvelle façon de gérer votre argent à Bondoukou.</p>
        </div>

        <div class="space-y-4 mb-8">
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase">Nom complet</label>
                <input type="text" id="nom" placeholder="Mohamed Naziru" class="w-full bg-transparent outline-none font-semibold text-slate-800">
            </div>
            <div class="bg-slate-50 p-4 rounded-2xl border border-slate-100">
                <label class="text-[10px] font-bold text-slate-400 uppercase">Numéro de téléphone</label>
                <input type="tel" id="tel" placeholder="07 00 00 00 00" class="w-full bg-transparent outline-none font-semibold text-slate-800">
            </div>
            <button onclick="valider()" class="w-full molo-gradient text-white font-bold py-5 rounded-2xl shadow-xl shadow-blue-200">COMMENCER</button>
        </div>
    </div>

    <div id="home" class="page">
        <div class="p-6 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-blue-100 rounded-full flex items-center justify-center text-blue-600 font-bold" id="avatar">N</div>
                <p class="font-bold text-slate-800">Salut, <span id="user">Blakis</span></p>
            </div>
            <i class="fa-solid fa-bell text-slate-300 text-xl"></i>
        </div>

        <div class="mx-6 molo-gradient p-6 molo-card text-white shadow-2xl shadow-blue-300 relative overflow-hidden">
            <p class="text-white/70 text-sm">Mon Solde</p>
            <h2 class="text-3xl font-black mt-1">45.000 <small class="text-sm">FCFA</small></h2>
            <div class="mt-8 flex gap-3">
                <button class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold flex items-center gap-2"><i class="fa-solid fa-plus"></i> Recharger</button>
                <button class="bg-white/20 px-4 py-2 rounded-xl text-xs font-bold">Retrait</button>
            </div>
            <i class="fa-solid fa-shield-halved absolute -right-4 -bottom-4 text-white/10 text-8xl"></i>
        </div>

        <div class="grid grid-cols-4 gap-4 p-6 mt-4">
            <div class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-blue-600"><i class="fa-solid fa-paper-plane"></i></div>
                <span class="text-[10px] font-bold text-slate-500">Envoyer</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-green-500"><i class="fa-solid fa-qrcode"></i></div>
                <span class="text-[10px] font-bold text-slate-500">Scanner</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-orange-500"><i class="fa-solid fa-bolt"></i></div>
                <span class="text-[10px] font-bold text-slate-500">Crédit</span>
            </div>
            <div class="flex flex-col items-center gap-2">
                <div class="w-14 h-14 bg-white rounded-2xl shadow-sm flex items-center justify-center text-purple-500"><i class="fa-solid fa-tv"></i></div>
                <span class="text-[10px] font-bold text-slate-500">Canal+</span>
            </div>
        </div>

        <div class="px-6 pb-24">
            <h3 class="font-bold text-slate-800 mb-4">Activités récentes</h3>
            <div class="bg-white p-4 rounded-2xl shadow-sm flex items-center justify-between mb-3">
                <div class="flex items-center gap-4">
                    <div class="w-10 h-10 bg-orange-100 rounded-xl flex items-center justify-center text-orange-600"><i class="fa-solid fa-shop"></i></div>
                    <div><p class="font-bold text-sm">Blakis Boutique</p><p class="text-[10px] text-slate-400">Hier, 14:20</p></div>
                </div>
                <p class="text-red-500 font-bold text-sm">-12.000 F</p>
            </div>
        </div>
    </div>

    <nav id="nav-bar" class="hidden fixed bottom-0 w-full bg-white border-t border-slate-100 flex justify-around p-4 z-50">
        <button onclick="show('home')" class="text-blue-600 flex flex-col items-center"><i class="fa-solid fa-house"></i><span class="text-[10px] font-bold">Accueil</span></button>
        <button class="text-slate-300 flex flex-col items-center"><i class="fa-solid fa-chart-pie"></i><span class="text-[10px] font-bold">Budget</span></button>
        <button class="text-slate-300 flex flex-col items-center"><i class="fa-solid fa-user"></i><span class="text-[10px] font-bold">Profil</span></button>
    </nav>

    <script>
        function valider() {
            const n = document.getElementById('nom').value;
            if(n.length < 2) { alert("Entre ton nom !"); return; }
            document.getElementById('user').innerText = n;
            document.getElementById('avatar').innerText = n[0].toUpperCase();
            
            document.getElementById('auth').classList.remove('active');
            document.getElementById('home').classList.add('active');
            document.getElementById('nav-bar').classList.remove('hidden');
        }
        function show(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
    </script>
</body>
</html>
