<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAKIS STORE | Panier & Paiement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-gray-100 font-sans pb-24">

    <header class="bg-[#f68b1e] p-3 sticky top-0 z-50 shadow-md flex items-center justify-between">
        <h1 class="text-white text-xl font-black italic">BLAKIS</h1>
        <div class="relative cursor-pointer" onclick="showCart()">
            <i class="fa-solid fa-cart-shopping text-white text-2xl"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] font-bold px-1.5 py-0.5 rounded-full">0</span>
        </div>
    </header>

    <div class="p-2 grid grid-cols-2 gap-2" id="grid"></div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[100] hidden flex justify-center items-end">
        <div class="bg-white w-full max-h-[80vh] rounded-t-3xl p-5 overflow-y-auto">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-lg font-bold">Mon Panier</h2>
                <button onclick="hideCart()" class="text-gray-500 text-2xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-3 mb-4"></div>
            <div class="border-t pt-4">
                <div class="flex justify-between font-bold text-lg mb-4">
                    <span>Total à payer :</span>
                    <span id="cart-total" class="text-[#f68b1e]">0 FCFA</span>
                </div>
                
                <h3 class="font-bold mb-2">Moyen de paiement :</h3>
                <select id="payment-method" class="w-full p-2 border rounded mb-4 outline-none">
                    <option value="Wave">Wave</option>
                    <option value="Orange Money">Orange Money</option>
                    <option value="Moov Money">Moov Money</option>
                    <option value="Paiement à la livraison">Paiement à la livraison</option>
                </select>

                <button onclick="checkout()" class="w-full bg-[#f68b1e] text-white py-3 rounded-xl font-bold shadow-lg">VALIDER LA COMMANDE</button>
            </div>
        </div>
    </div>

    <script>
        const products = [
            {id:1, n: 'Ventilateur Binatone', p: 18000, img: 'https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=400'},
            {id:2, n: 'Chargeur iPhone', p: 5000, img: 'https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400'},
            {id:3, n: 'Airpods Pro', p: 10000, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'},
            {id:4, n: 'Rallonge 5m', p: 3500, img: 'https://images.unsplash.com/photo-1558403194-611308249627?w=400'}
        ];

        let cart = [];

        function renderProducts() {
            document.getElementById('grid').innerHTML = products.map(p => `
                <div class="bg-white p-2 rounded shadow-sm border border-gray-100">
                    <img src="${p.img}" class="w-full h-32 object-cover rounded">
                    <h3 class="text-xs font-bold mt-2 h-8 overflow-hidden">${p.n}</h3>
                    <p class="text-[#f68b1e] font-black my-1">${p.p} F</p>
                    <button onclick="addToCart(${p.id})" class="w-full bg-black text-white py-1.5 rounded text-[10px] font-bold">+ PANIER</button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const product = products.find(p => p.id === id);
            cart.push(product);
            updateCart();
            alert(product.n + " ajouté au panier !");
        }

        function updateCart() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((sum, item) => sum + item.p, 0);
            document.getElementById('cart-total').innerText = total + " FCFA";
            
            document.getElementById('cart-items').innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center text-sm border-b pb-2">
                    <span>${item.n}</span>
                    <div class="flex items-center gap-3">
                        <span class="font-bold">${item.p} F</span>
                        <button onclick="removeFromCart(${index})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function removeFromCart(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function showCart() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function hideCart() { document.getElementById('cart-modal').classList.add('hidden'); }

        function checkout() {
            const total = cart.reduce((sum, item) => sum + item.p, 0);
            const method = document.getElementById('payment-method').value;
            const itemsList = cart.map(i => i.n).join(', ');
            const msg = `Salut Blakis ! Je commande : ${itemsList}. Total : ${total} FCFA. Paiement par : ${method}`;
            window.open(`https://wa.me/2250173865409?text=${encodeURIComponent(msg)}`);
        }

        renderProducts();
    </script>
</body>
</html>
