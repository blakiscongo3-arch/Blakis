<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLAKIS STORE | Officiel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .jumia-orange { background-color: #f68b1e; }
        .bg-f1 { background-color: #f1f1f2; }
        #side-menu { transition: 0.3s; }
        .hidden-scroll::-webkit-scrollbar { display: none; }
        /* Animation chargement */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #f68b1e; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-f1 font-sans pb-20">

    <div id="side-menu" class="fixed inset-y-0 left-0 w-72 bg-white z-[100] shadow-2xl transform -translate-x-full">
        <div class="jumia-orange p-6 text-white">
            <div class="flex justify-between items-center mb-4">
                <h2 class="font-bold text-lg italic">BLAKIS STORE</h2>
                <button onclick="toggleMenu()"><i class="fa-solid fa-xmark text-2xl"></i></button>
            </div>
            <p class="text-xs">Connectez-vous pour vos offres</p>
            <button class="mt-3 bg-white text-[#f68b1e] px-4 py-2 rounded font-bold text-xs uppercase">Se Connecter</button>
        </div>
        <div class="p-4 space-y-5 text-gray-700 text-sm">
            <div class="flex items-center space-x-4"><i class="fa-solid fa-house"></i> <span>Accueil</span></div>
            <div class="flex items-center space-x-4"><i class="fa-solid fa-box"></i> <span>Mes Commandes</span></div>
            <div class="flex items-center space-x-4"><i class="fa-solid fa-heart"></i> <span>Favoris</span></div>
            <hr>
            <h3 class="text-[10px] font-bold text-gray-400 uppercase">Nos Catégories</h3>
            <div onclick="filterCat('elec')" class="flex items-center space-x-4 cursor-pointer"><i class="fa-solid fa-bolt text-yellow-500"></i> <span>Électricité</span></div>
            <div onclick="filterCat('tel')" class="flex items-center space-x-4 cursor-pointer"><i class="fa-solid fa-mobile-screen"></i> <span>Téléphones</span></div>
            <div onclick="filterCat('mode')" class="flex items-center space-x-4 cursor-pointer"><i class="fa-solid fa-shirt"></i> <span>Mode</span></div>
        </div>
    </div>

    <header class="jumia-orange p-3 sticky top-0 z-50 flex flex-col shadow-md">
        <div class="flex items-center justify-between text-white mb-2">
            <div class="flex items-center space-x-4">
                <button onclick="toggleMenu()"><i class="fa-solid fa-bars text-xl"></i></button>
                <h1 class="text-xl font-black italic">BLAKIS</h1>
            </div>
            <div class="flex items-center space-x-4">
                <i class="fa-solid fa-user text-xl"></i>
                <div class="relative" onclick="showCart()">
                    <i class="fa-solid fa-cart-shopping text-xl"></i>
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-[10px] px-1.5 py-0.5 rounded-full font-bold">0</span>
                </div>
            </div>
        </div>
        <div class="relative bg-white rounded flex items-center p-2">
            <i class="fa-solid fa-magnifying-glass text-gray-400 mr-2 text-sm"></i>
            <input type="text" id="searchInput" onkeyup="search()" placeholder="Chercher un article..." class="w-full text-sm outline-none">
        </div>
    </header>

    <div class="p-2 grid grid-cols-2 gap-2" id="productGrid"></div>

    <div id="cart-modal" class="fixed inset-0 bg-black/50 z-[200] hidden flex flex-col justify-end">
        <div class="bg-white rounded-t-3xl p-5 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-5 border-b pb-3">
                <h2 class="font-bold text-lg">VOTRE PANIER</h2>
                <button onclick="hideCart()" class="text-3xl">&times;</button>
            </div>
            <div id="cart-items" class="space-y-4"></div>
            <div class="mt-6 border-t pt-4">
                <div class="flex justify-between items-center mb-6">
                    <span class="text-gray-500 font-bold">Total</span>
                    <span id="cart-total" class="text-xl font-black text-[#f68b1e]">0 F</span>
                </div>
                <div class="mb-4">
                    <label class="text-xs font-bold text-gray-400">MODE DE PAIEMENT AUTOMATIQUE</label>
                    <select id="pay-method" class="w-full p-3 border rounded mt-1 outline-none font-bold">
                        <option value="Wave">Wave Côte d'Ivoire</option>
                        <option value="Orange">Orange Money</option>
                        <option value="MTN">MTN MoMo</option>
                    </select>
                </div>
                <button onclick="startAutoPayment()" class="w-full bg-[#f68b1e] text-white py-4 rounded font-bold shadow-lg uppercase">Valider et Payer</button>
            </div>
        </div>
    </div>

    <div id="loading-screen" class="fixed inset-0 bg-white/90 z-[300] hidden flex flex-col items-center justify-center text-center p-6">
        <div class="loader mb-4"></div>
        <h2 class="text-lg font-black uppercase">Connexion Sécurisée...</h2>
        <p class="text-sm text-gray-500 mt-2">Veuillez valider la demande de retrait sur votre téléphone <br> <span class="font-bold text-black">(Numéro: 01 71 40 43 45)</span></p>
    </div>

    <script>
        const products = [
            {id:1, cat:'tel', n: 'Chargeur Rapide 20W', p: 5000, img: 'https://images.unsplash.com/photo-1583863788434-e58a36330cf0?w=400'},
            {id:2, cat:'elec', n: 'Ventilateur Rechargeable', p: 18000, img: 'https://images.unsplash.com/photo-1591123120675-6f7f1aae0e5b?w=400'},
            {id:3, cat:'tel', n: 'Airpods Pro Luxe', p: 10000, img: 'https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=400'},
            {id:4, cat:'tel', n: 'iPhone 13 Pro Max', p: 450000, img: 'https://images.unsplash.com/photo-1632661674596-df8be070a5c5?w=400'}
        ];

        let cart = [];

        function render(data = products) {
            document.getElementById('productGrid').innerHTML = data.map(p => `
                <div class="bg-white rounded overflow-hidden shadow-sm flex flex-col border border-gray-100">
                    <img src="${p.img}" class="w-full h-36 object-cover">
                    <div class="p-2 flex-1 flex flex-col">
                        <h3 class="text-[11px] h-8 overflow-hidden font-medium">${p.n}</h3>
                        <p class="font-bold text-sm text-gray-900 mt-1">${p.p.toLocaleString()} F</p>
                        <button onclick="addToCart(${p.id})" class="mt-2 w-full bg-[#f68b1e] text-white py-2 rounded text-[10px] font-bold uppercase shadow-sm active:scale-95 transition-transform">Ajouter</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            update();
            const btn = event.target;
            btn.innerText = "AJOUTÉ !";
            btn.classList.replace('bg-[#f68b1e]', 'bg-green-500');
            setTimeout(() => { btn.innerText = "AJOUTER"; btn.classList.replace('bg-green-500', 'bg-[#f68b1e]'); }, 1000);
        }

        function update() {
            document.getElementById('cart-count').innerText = cart.length;
            const total = cart.reduce((s, i) => s + i.p, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + " F";
            document.getElementById('cart-items').innerHTML = cart.map((i, idx) => `
                <div class="flex items-center space-x-3 border-b pb-3 animate-in">
                    <img src="${i.img}" class="w-14 h-14 rounded object-cover border">
                    <div class="flex-1">
                        <h4 class="text-xs font-bold">${i.n}</h4>
                        <p class="text-[#f68b1e] font-black text-sm">${i.p.toLocaleString()} F</p>
                    </div>
                    <button onclick="remove(${idx})" class="text-red-500 px-2"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function remove(idx) { cart.splice(idx, 1); update(); }

        function startAutoPayment() {
            if(cart.length === 0) return;
            const method = document.getElementById('pay-method').value;
            const total = cart.reduce((s, i) => s + i.p, 0);
            
            document.getElementById('loading-screen').classList.remove('hidden');
            
            setTimeout(() => {
                document.getElementById('loading-screen').classList.add('hidden');
                // Envoi vers WhatsApp pour confirmation finale automatique
                const list = cart.map(i => "• " + i.n).join('%0A');
                window.open(`https://wa.me/2250171404345?text=PAIEMENT ${method} INITIÉ%0A%0AMontant: ${total} F%0AArticles: %0A${list}`);
            }, 3000);
        }

        function search() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = products.filter(p => p.n.toLowerCase().includes(query));
            render(filtered);
        }

        function filterCat(c) {
            const filtered = products.filter(p => p.cat === c);
            render(filtered);
            toggleMenu();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('-translate-x-full'); }
        function showCart() { document.getElementById('cart-modal').classList.remove('hidden'); }
        function hideCart() { document.getElementById('cart-modal').classList.add('hidden'); }

        render();
    </script>
</body>
</html>
